[project]
name = "farchive"
version = "0.2.0"
description = "Content-addressed archive with locator-scoped observation history and adaptive zstd compression."
requires-python = ">=3.11"
dependencies = ["zstandard>=0.21"]
readme = "README.md"
license = "MIT"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Database",
    "Topic :: System :: Archiving",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[project.scripts]
farchive = "farchive._cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
